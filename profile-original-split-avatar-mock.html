<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Split Avatar Mock</title>
    <style>
      :root {
        --page: #101827;
        --card: #252d3b;
        --card-2: #313948;
        --line: rgba(255, 255, 255, 0.1);
        --line-strong: rgba(255, 255, 255, 0.16);
        --text: #f7f8fb;
        --muted: #c5cad4;
        --blue: #4a78f0;
        --blue-soft: #9fc0ff;
        --danger: #8b3d4b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 50% 5%, rgba(61, 93, 160, 0.16), transparent 34%),
          var(--page);
        color: var(--text);
        font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      }

      .page {
        width: min(820px, calc(100% - 32px));
        margin: 34px auto;
      }

      .profile-card {
        border: 1px solid var(--line-strong);
        border-radius: 26px;
        background:
          radial-gradient(circle at 80% 20%, rgba(76, 119, 240, 0.06), transparent 28%),
          var(--card);
        padding: 42px 36px;
        box-shadow: 0 26px 70px rgba(0, 0, 0, 0.32);
      }

      .hero {
        display: grid;
        grid-template-columns: 0.92fr 1.08fr;
        gap: 28px;
        align-items: center;
        margin-bottom: 30px;
      }

      .identity {
        text-align: left;
      }

      .photo {
        display: grid;
        place-items: center;
        width: 132px;
        height: 132px;
        border-radius: 999px;
        margin-bottom: 24px;
        background: linear-gradient(145deg, #315ee4, #5a86ff);
        box-shadow: 0 18px 36px rgba(74, 120, 240, 0.28);
        color: rgba(255, 255, 255, 0.88);
        font-size: 34px;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: 40px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .nickname {
        margin-top: 14px;
        color: var(--muted);
        font-size: 22px;
      }

      .face-status {
        display: inline-flex;
        margin-top: 22px;
        border: 1px solid var(--line-strong);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        padding: 14px 18px;
        color: var(--blue-soft);
        font-size: 18px;
        font-weight: 800;
      }

      .avatar-stage {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 286px;
        border: 1px solid var(--line);
        border-radius: 24px;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 44%, rgba(255, 248, 233, 0.26), transparent 34%),
          linear-gradient(155deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025));
      }

      .avatar-stage::before {
        content: "";
        position: absolute;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(159, 192, 255, 0.28), transparent 68%);
      }

      .avatar-label {
        position: absolute;
        top: 16px;
        left: 18px;
        color: var(--blue-soft);
        font-size: 20px;
        font-weight: 900;
      }

      .avatar-img {
        position: relative;
        width: min(250px, 74%);
        height: auto;
        filter: drop-shadow(0 22px 20px rgba(0, 0, 0, 0.22));
      }

      .platform {
        position: absolute;
        bottom: 28px;
        width: 210px;
        height: 34px;
        border-radius: 50%;
        background: radial-gradient(ellipse, rgba(159, 192, 255, 0.3), transparent 70%);
      }

      .top-actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 28px;
      }

      .mini-card,
      .info-box,
      .info-row,
      .button {
        border: 1px solid var(--line-strong);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.055);
      }

      .mini-card {
        padding: 18px;
        text-align: center;
      }

      .mini-card strong {
        display: block;
        margin-bottom: 8px;
        color: var(--blue-soft);
        font-size: 24px;
        font-family: Georgia, "Times New Roman", serif;
      }

      .mini-card span {
        color: var(--muted);
        font-size: 18px;
      }

      .info-section {
        display: grid;
        gap: 20px;
      }

      .info-box {
        padding: 24px 28px;
      }

      .info-box h2 {
        margin: 0 0 18px;
        color: var(--blue-soft);
        font-size: 24px;
      }

      .info-box p {
        margin: 0;
        color: var(--text);
        font-size: 20px;
      }

      .meta {
        display: grid;
        gap: 14px;
        margin-top: 28px;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        padding: 18px 24px;
        color: var(--muted);
        font-size: 20px;
      }

      .info-row strong {
        color: var(--text);
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-top: 34px;
      }

      .button {
        padding: 18px 20px;
        color: var(--text);
        text-align: center;
        font-size: 20px;
        font-weight: 800;
      }

      .button.primary {
        border-color: rgba(74, 120, 240, 0.9);
        background: linear-gradient(145deg, #3d6ff1, #4c84ff);
        box-shadow: 0 16px 28px rgba(74, 120, 240, 0.2);
      }

      .button.full {
        grid-column: 1 / -1;
      }

      .button.danger {
        border-color: rgba(210, 88, 104, 0.48);
        background: rgba(139, 61, 75, 0.42);
      }

      .design-note {
        margin: 16px 0 0;
        color: #9aa4b5;
        text-align: center;
        font-size: 14px;
      }

      @media (max-width: 720px) {
        .profile-card {
          padding: 28px 22px;
        }

        .hero,
        .top-actions,
        .buttons {
          grid-template-columns: 1fr;
        }

        .identity {
          text-align: center;
        }

        .photo {
          margin-left: auto;
          margin-right: auto;
        }

        .avatar-stage {
          min-height: 260px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="profile-card">
        <section class="hero">
          <div class="identity">
            <div class="photo">?</div>
            <h1>張嘉航</h1>
            <div class="nickname">@統神</div>
            <div class="face-status">Face ID　已註冊</div>
          </div>

          <div class="avatar-stage">
            <div class="avatar-label">虛擬替身</div>
            <div class="platform"></div>
            <img
              class="avatar-img"
              src="file:///C:/Users/user/Desktop/avatar_base.png"
              alt="使用者虛擬替身"
            />
          </div>
        </section>

        <section class="top-actions">
          <div class="mini-card">
            <strong>Quiz</strong>
            <span>測驗中心</span>
          </div>
          <div class="mini-card">
            <strong>History</strong>
            <span>歷史紀錄</span>
          </div>
          <div class="mini-card">
            <strong>Face ID</strong>
            <span>已註冊</span>
          </div>
        </section>

        <section class="info-section">
          <div class="info-box">
            <h2>自我介紹</h2>
            <p>尚無自我介紹</p>
          </div>

          <div class="info-box">
            <h2>額外資訊</h2>
            <p>尚無額外資訊</p>
          </div>
        </section>

        <section class="meta">
          <div class="info-row">
            <span>使用者 ID</span>
            <strong>13</strong>
          </div>
          <div class="info-row">
            <span>建立時間</span>
            <strong>2026/06/01 下午06:24</strong>
          </div>
          <div class="info-row">
            <span>更新時間</span>
            <strong>2026/06/01 下午06:24</strong>
          </div>
        </section>

        <section class="buttons">
          <div class="button primary">Quiz Center</div>
          <div class="button">歷史紀錄</div>
          <div class="button">編輯資料</div>
          <div class="button">重新註冊臉部</div>
          <div class="button full">回首頁</div>
          <div class="button full danger">登出</div>
        </section>
      </section>

      <p class="design-note">
        Mock only：這版保留原本個人頁的深色卡片、資訊區塊與按鈕配置，只調整頂部身份區為左資料、右替身。
      </p>
    </main>
  </body>
</html>
