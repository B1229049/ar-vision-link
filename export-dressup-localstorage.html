<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Export Dressup Settings</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #0f172a;
        color: white;
        font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
        padding: 32px;
        box-sizing: border-box;
      }

      main {
        width: min(980px, 100%);
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 12px;
      }

      p {
        color: rgba(255, 255, 255, 0.75);
        line-height: 1.7;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        background: #2563eb;
        color: white;
        font-weight: 800;
        cursor: pointer;
      }

      textarea,
      pre {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.08);
        color: white;
        padding: 16px;
        margin-top: 16px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 13px;
        line-height: 1.55;
      }

      textarea {
        min-height: 420px;
      }

      .warn {
        border-left: 4px solid #f59e0b;
        padding-left: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Dressup 設定匯出工具</h1>
      <p class="warn">
        請用原本調整 dressup 的同一個瀏覽器，以 file:// 方式打開這個 HTML。
        這個工具只讀取 dressup_adjustments、dressup_thumb_adjustments、dressup_body_y_v2。
      </p>
      <button id="export-btn">產生專案設定碼</button>
      <pre id="status">尚未匯出</pre>
      <textarea id="output" readonly></textarea>
    </main>

    <script>
      function readJson(key) {
        try {
          return JSON.parse(localStorage.getItem(key) || "{}");
        } catch {
          return {};
        }
      }

      function normalizeNumber(value, fallback = 0) {
        const number = Number(value);
        return Number.isFinite(number) ? number : fallback;
      }

      function convertSettings() {
        const wear = readJson("dressup_adjustments");
        const thumb = readJson("dressup_thumb_adjustments");
        const keys = new Set([...Object.keys(wear), ...Object.keys(thumb)]);
        const result = {};

        keys.forEach((key) => {
          const wearValue = wear[key] || {};
          const thumbValue = thumb[key] || {};

          result[key] = {
            scale: normalizeNumber(wearValue.scale, 1),
            x: normalizeNumber(wearValue.x, 0),
            y: normalizeNumber(wearValue.y, 0),
            thumb_scale: normalizeNumber(thumbValue.scale, 1),
            thumb_x: normalizeNumber(thumbValue.x, 0),
            thumb_y: normalizeNumber(thumbValue.y, 0),
          };
        });

        return result;
      }

      function exportCode() {
        const result = convertSettings();
        const bodyY = localStorage.getItem("dressup_body_y_v2");
        const code =
`// Global avatar item placement settings.
// Exported from the original dressup localStorage.
// These settings are bundled into the frontend, so every user sees the same
// corrected item placement after the site is redeployed.
export const DEFAULT_AVATAR_ITEM_SETTINGS = ${JSON.stringify(result, null, 2)};

export const DEFAULT_AVATAR_BODY_Y = ${JSON.stringify(bodyY ?? "2")};
`;

        document.getElementById("output").value = code;
        document.getElementById("status").textContent =
          `已匯出 ${Object.keys(result).length} 筆物件設定。`;
      }

      document.getElementById("export-btn").addEventListener("click", exportCode);
      exportCode();
    </script>
  </body>
</html>
