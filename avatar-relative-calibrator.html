<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Vision Link Avatar Calibrator</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #050a08;
        color: white;
        font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(360px, 520px) minmax(420px, 1fr) 360px;
        gap: 22px;
        min-height: 100vh;
        padding: 22px;
      }

      .panel {
        border: 1px solid #273136;
        border-radius: 22px;
        background: #1a2225;
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.36);
        overflow: hidden;
      }

      .stage-panel {
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #183325 0%, #111f19 100%);
      }

      .stage {
        position: relative;
        width: min(420px, 92%);
        aspect-ratio: 408 / 612;
        border-radius: 18px;
      }

      .layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center bottom;
        transform-origin: center center;
        pointer-events: none;
      }

      .template-00,
      .template-02 {
        opacity: 1;
      }

      .layer-back {
        z-index: 1;
      }

      .template-00 {
        z-index: 2;
      }

      .hair-front {
        z-index: 4;
      }

      .face-front {
        z-index: 5;
      }

      .template-02 {
        z-index: 6;
      }

      .bottoms-front {
        z-index: 7;
      }

      .top-front {
        z-index: 8;
      }

      .crop-frame {
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 30;
        border: 3px solid #facc15;
        border-radius: 14px;
        box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.38);
        pointer-events: none;
      }

      .toolbar,
      .controls {
        padding: 20px;
      }

      h1,
      h2 {
        margin: 0 0 12px;
      }

      p {
        margin: 0 0 16px;
        color: #9fb0bd;
        line-height: 1.6;
      }

      label {
        display: block;
        margin: 14px 0 7px;
        color: #9fb0bd;
        font-size: 13px;
        font-weight: 700;
      }

      select,
      input,
      textarea {
        width: 100%;
        border: 1px solid #273136;
        border-radius: 10px;
        background: #101719;
        color: white;
        padding: 10px 12px;
        font: inherit;
      }

      input[type="range"] {
        padding: 0;
        accent-color: #4caf50;
      }

      .tabs,
      .actions,
      .preview-selectors {
        display: grid;
        gap: 10px;
      }

      .tabs {
        grid-template-columns: repeat(2, 1fr);
      }

      .preview-selectors {
        grid-template-columns: repeat(2, 1fr);
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 11px 13px;
        background: #2a373d;
        color: white;
        font-weight: 800;
        cursor: pointer;
      }

      button.active,
      button.primary {
        background: #2563eb;
      }

      button.good {
        background: #4caf50;
      }

      button.warn {
        background: #b45309;
      }

      .range-row {
        margin-top: 14px;
      }

      .range-row label {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .collapsible-tools {
        display: none;
      }

      .collapsible-tools.visible {
        display: block;
      }

      .toggle-row {
        display: none;
        margin-top: 16px;
        border: 1px solid #273136;
        border-radius: 12px;
        background: #101719;
        padding: 12px;
      }

      .toggle-row.visible {
        display: block;
      }

      .toggle-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin: 0;
        color: #dbeafe;
      }

      .toggle-label input {
        width: auto;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-top: 16px;
        max-height: 360px;
        overflow: auto;
        padding-right: 4px;
      }

      .item-card {
        position: relative;
        aspect-ratio: 1;
        border: 2px solid transparent;
        border-radius: 12px;
        background: #273136;
        overflow: hidden;
      }

      .item-card.active {
        border-color: #7dd3fc;
      }

      .item-card.equipped::after {
        content: "穿戴中";
        position: absolute;
        left: 6px;
        right: 6px;
        bottom: 6px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.86);
        color: white;
        padding: 3px 6px;
        font-size: 11px;
        font-weight: 800;
      }

      .thumb-layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        transform-origin: center center;
      }

      .export {
        min-height: 360px;
        margin-top: 12px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
        line-height: 1.5;
      }

      .small-note {
        color: #cbd5e1;
        font-size: 12px;
      }

      @media (max-width: 1100px) {
        .app {
          grid-template-columns: 1fr;
        }

        .stage-panel {
          min-height: 620px;
        }
      }
    </style>
  </head>
  <body>
    <script>
      if (location.protocol === "file:") {
        document.addEventListener("DOMContentLoaded", () => {
          document.body.innerHTML = `
            <main style="min-height:100vh;display:grid;place-items:center;padding:32px;background:#050a08;color:white;font-family:'Segoe UI','Noto Sans TC',Arial,sans-serif;">
              <section style="max-width:720px;border:1px solid #273136;border-radius:22px;background:#1a2225;padding:28px;line-height:1.8;">
                <h1 style="margin-top:0;">請用本地網站開啟校準工具</h1>
                <p>這個檔案現在會讀取專案內的 <code>src/utils/avatarItemSettings.js</code>，所以不能直接雙擊 HTML 檔案開啟。</p>
                <p>請在 <code>C:\\Users\\user\\Desktop\\TeamProject\\ar-vision-link</code> 執行：</p>
                <pre style="white-space:pre-wrap;background:#101719;border-radius:12px;padding:16px;">npm run dev</pre>
                <p>然後用瀏覽器打開：</p>
                <pre style="white-space:pre-wrap;background:#101719;border-radius:12px;padding:16px;">http://127.0.0.1:5173/ar-vision-link/avatar-relative-calibrator.html</pre>
              </section>
            </main>
          `;
        });
      }
    </script>
    <main class="app">
      <section class="panel stage-panel">
        <div class="stage" id="stage"></div>
      </section>

      <section class="panel toolbar">
        <h1>Avatar 相對座標校準工具</h1>
        <p>
          這裡調的是模板與物件之間的相對大小和相對位置。匯出後覆蓋
          <code>src/utils/avatarItemSettings.js</code>，重新部署前端，所有 user 共用同一套校準。
        </p>

        <h2>預覽穿搭</h2>
        <div class="preview-selectors" id="preview-selectors"></div>

        <h2 style="margin-top: 22px">選擇要校準的類別</h2>
        <div class="tabs" id="tabs"></div>

        <div class="grid" id="item-grid"></div>
      </section>

      <section class="panel controls">
        <h2>校準控制</h2>
        <p id="target-label">尚未選擇</p>

        <label>圖層</label>
        <select id="layer-select"></select>

        <div class="range-row">
          <label>角色縮放 <span id="scale-value">1.00</span></label>
          <input id="scale" type="range" min="0.1" max="3" step="0.01" />
        </div>

        <div class="range-row">
          <label>角色 X% <span id="x-value">0.00</span></label>
          <input id="x-pct" type="range" min="-80" max="80" step="0.05" />
        </div>

        <div class="range-row">
          <label>角色 Y% <span id="y-value">0.00</span></label>
          <input id="y-pct" type="range" min="-80" max="80" step="0.05" />
        </div>

        <div class="range-row">
          <label>縮圖縮放 <span id="thumb-scale-value">1.00</span></label>
          <input id="thumb-scale" type="range" min="0.2" max="3" step="0.01" />
        </div>

        <div class="range-row">
          <label>縮圖 X% <span id="thumb-x-value">0.00</span></label>
          <input id="thumb-x-pct" type="range" min="-120" max="120" step="0.05" />
        </div>

        <div class="range-row">
          <label>縮圖 Y% <span id="thumb-y-value">0.00</span></label>
          <input id="thumb-y-pct" type="range" min="-120" max="120" step="0.05" />
        </div>

        <div class="toggle-row" id="hair-back-thumb-row">
          <label class="toggle-label">
            <span>縮圖顯示頭髮 -2 後層</span>
            <input id="show-back-thumb" type="checkbox" />
          </label>
        </div>

        <button
          type="button"
          id="toggle-crop-tools"
          style="width: 100%; margin-top: 24px"
        >
          顯示全域頭像裁切框
        </button>

        <div class="collapsible-tools" id="crop-tools-panel">
          <h2 style="margin-top: 18px">全域頭像裁切框</h2>
          <p class="small-note">
            這個正方形裁切框會套用給所有 user，用來從目前穿搭產生排行榜與 Lobby 的 avatar_url。
          </p>

          <div class="range-row">
            <label>正方形邊長% <span id="crop-size-value">46.00</span></label>
            <input id="crop-size-pct" type="range" min="20" max="90" step="0.05" />
          </div>

          <div class="range-row">
            <label>裁切框 X% <span id="crop-x-value">0.00</span></label>
            <input id="crop-x-pct" type="range" min="-50" max="50" step="0.05" />
          </div>

          <div class="range-row">
            <label>裁切框 Y% <span id="crop-y-value">-18.00</span></label>
            <input id="crop-y-pct" type="range" min="-60" max="60" step="0.05" />
          </div>

          <div class="range-row">
            <label>頭像輸出縮放 <span id="crop-scale-value">1.00</span></label>
            <input id="crop-scale" type="range" min="0.5" max="2" step="0.01" />
          </div>
        </div>

        <div class="actions" style="margin-top: 18px">
          <button class="good" id="save-target">儲存目前目標</button>
          <button id="reset-target">重置目前目標</button>
          <button class="warn" id="copy-code">複製匯出碼</button>
        </div>

        <p class="small-note" style="margin-top: 14px">
          調整會先套用在預覽；按下「儲存目前目標」後，才會寫入此瀏覽器 localStorage：<code>arvl_avatar_relative_settings</code>。
        </p>

        <textarea id="export-output" class="export" readonly></textarea>
      </section>
    </main>

    <script type="module">
      import {
        DEFAULT_AVATAR_CROP_SETTINGS,
        DEFAULT_AVATAR_ITEM_SETTINGS,
        DEFAULT_AVATAR_TEMPLATE_SETTINGS,
      } from "./src/utils/avatarItemSettings.js";

      const ASSET_BASE = "public/avatar-assets";
      const STORAGE_KEY = "arvl_avatar_relative_settings";

      const categories = [
        { key: "template", label: "模板" },
        { key: "hair", label: "頭部" },
        { key: "face", label: "臉部" },
        { key: "top", label: "上半身" },
        { key: "bottoms", label: "下半身" },
      ];

      const templates = [
        { id: "template-00", label: "模板00", img: `${ASSET_BASE}/templates/模板00.png`, className: "template-00" },
        { id: "template-02", label: "模板02", img: `${ASSET_BASE}/templates/模板02.png`, className: "template-02" },
      ];

      const splitHairIds = new Set([7, 8, 10, 14, 15]);

      function numberedItem(category, prefix, number) {
        const padded = String(number).padStart(2, "0");

        return {
          id: `${category}-${number}`,
          label: `${prefix}${padded}`,
          frontImg: `${ASSET_BASE}/${category}/${prefix}${padded}.png`,
        };
      }

      function hairItem(number) {
        const padded = String(number).padStart(2, "0");
        const id = `hair-${number}`;
        const base = `${ASSET_BASE}/hair/頭髮${padded}`;
        const item = {
          id,
          label: `頭髮${padded}`,
          thumbImg: `${base}-0.png`,
        };

        return splitHairIds.has(number)
          ? { ...item, frontImg: `${base}-1.png`, backImg: `${base}-2.png` }
          : { ...item, frontImg: `${base}.png` };
      }

      const items = {
        hair: Array.from({ length: 16 }, (_, index) => hairItem(index + 1)),
        face: Array.from({ length: 12 }, (_, index) =>
          numberedItem("face", "表情", index + 1)
        ),
        top: Array.from({ length: 16 }, (_, index) =>
          numberedItem("top", "上衣", index + 1)
        ),
        bottoms: Array.from({ length: 8 }, (_, index) =>
          numberedItem("bottoms", "褲裝", index + 1)
        ),
      };

      const defaultSetting = () => ({
        scale: 1,
        x_pct: 0,
        y_pct: 0,
        thumb_scale: 1,
        thumb_x_pct: 0,
        thumb_y_pct: 0,
        show_thumb: true,
      });

      const state = {
        category: "top",
        targetId: "top-1",
        layer: "front",
        preview: {
          hair: "hair-1",
          face: "face-1",
          top: "top-1",
          bottoms: "bottoms-1",
        },
        showCropTools: false,
        settings: loadSettings(),
        draftKey: null,
        draftSetting: null,
      };

      function loadSettings() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
          const settings = {
            items: {
              ...DEFAULT_AVATAR_ITEM_SETTINGS,
              ...(saved.items || {}),
            },
            templates: {
              ...DEFAULT_AVATAR_TEMPLATE_SETTINGS,
              ...(saved.templates || {}),
            },
            crop: {
              ...DEFAULT_AVATAR_CROP_SETTINGS,
              ...(saved.crop || {}),
            },
          };
          delete settings.templates["template-01"];
          return settings;
        } catch {
          const settings = {
            items: { ...DEFAULT_AVATAR_ITEM_SETTINGS },
            templates: { ...DEFAULT_AVATAR_TEMPLATE_SETTINGS },
            crop: { ...DEFAULT_AVATAR_CROP_SETTINGS },
          };
          delete settings.templates["template-01"];
          return settings;
        }
      }

      function persistSettings() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.settings));
      }

      function settingKey() {
        if (state.category === "template") return state.targetId;
        return `${state.targetId}_${state.layer}`;
      }

      function currentSetting() {
        const key = settingKey();
        const source = state.category === "template" ? state.settings.templates : state.settings.items;
        return { ...defaultSetting(), ...(source[key] || {}) };
      }

      function startDraft() {
        state.draftKey = settingKey();
        state.draftSetting = { ...defaultSetting(), ...currentSetting() };
      }

      function ensureDraft() {
        if (state.draftKey !== settingKey() || !state.draftSetting) {
          startDraft();
        }
        return state.draftSetting;
      }

      function displaySetting(itemId, layer = "front") {
        const key = `${itemId}_${layer}`;
        if (state.category !== "template" && state.draftKey === key && state.draftSetting) {
          return state.draftSetting;
        }
        return itemSetting(itemId, layer);
      }

      function displayTemplateSetting(templateId) {
        if (state.category === "template" && state.draftKey === templateId && state.draftSetting) {
          return state.draftSetting;
        }
        return templateSetting(templateId);
      }

      function saveCurrentSetting(next) {
        const key = settingKey();
        const source = state.category === "template" ? state.settings.templates : state.settings.items;
        source[key] = { ...defaultSetting(), ...next };
        persistSettings();
      }

      function applyStyle(element, setting) {
        element.style.transform = `translate(${setting.x_pct || 0}%, ${setting.y_pct || 0}%) scale(${setting.scale || 1})`;
      }

      function applyThumbStyle(element, setting) {
        element.style.transform = `translate(${setting.thumb_x_pct || 0}%, ${setting.thumb_y_pct || 0}%) scale(${setting.thumb_scale || 1})`;
      }

      function itemSetting(itemId, layer = "front") {
        return {
          ...defaultSetting(),
          ...(state.settings.items[`${itemId}_${layer}`] || state.settings.items[itemId] || {}),
        };
      }

      function templateSetting(templateId) {
        return {
          ...defaultSetting(),
          ...(state.settings.templates[templateId] || {}),
        };
      }

      function renderStage() {
        const stage = document.getElementById("stage");
        stage.innerHTML = "";

        ["bottoms", "top", "face", "hair"].forEach((category) => {
          const item = items[category].find((entry) => entry.id === state.preview[category]);
          if (!item?.backImg) return;

          const back = document.createElement("img");
          back.className = `layer layer-back ${category}-back`;
          back.src = item.backImg;
          applyStyle(back, displaySetting(item.id, "back"));
          stage.appendChild(back);
        });

        ["template-00"].forEach((templateId) => {
          const template = templates.find((entry) => entry.id === templateId);
          const img = document.createElement("img");
          img.className = `layer ${template.className}`;
          img.src = template.img;
          applyStyle(img, displayTemplateSetting(template.id));
          stage.appendChild(img);
        });

        ["hair", "face"].forEach((category) => {
          const item = items[category].find((entry) => entry.id === state.preview[category]);
          if (!item) return;

          const front = document.createElement("img");
          front.className = `layer ${category}-front`;
          front.src = item.frontImg;
          applyStyle(front, displaySetting(item.id, "front"));
          stage.appendChild(front);
        });

        const bodyTemplate = templates.find((entry) => entry.id === "template-02");
        const body = document.createElement("img");
        body.className = `layer ${bodyTemplate.className}`;
        body.src = bodyTemplate.img;
        applyStyle(body, displayTemplateSetting(bodyTemplate.id));
        stage.appendChild(body);

        ["bottoms", "top"].forEach((category) => {
          const item = items[category].find((entry) => entry.id === state.preview[category]);
          if (!item) return;

          const front = document.createElement("img");
          front.className = `layer ${category}-front`;
          front.src = item.frontImg;
          applyStyle(front, displaySetting(item.id, "front"));
          stage.appendChild(front);
        });

        if (state.showCropTools) {
          const crop = state.settings.crop || DEFAULT_AVATAR_CROP_SETTINGS;
          const squareSize = Number(crop.size_pct) || 46;
          const squareSizePx = stage.clientWidth * (squareSize / 100);
          const cropFrame = document.createElement("div");
          cropFrame.className = "crop-frame";
          cropFrame.style.width = `${squareSizePx}px`;
          cropFrame.style.height = `${squareSizePx}px`;
          cropFrame.style.transform = `translate(calc(-50% + ${Number(crop.x_pct) || 0}%), calc(-50% + ${Number(crop.y_pct) || 0}%)) scale(${Number(crop.scale) || 1})`;
          stage.appendChild(cropFrame);
        }
      }

      function renderPreviewSelectors() {
        const wrap = document.getElementById("preview-selectors");
        wrap.innerHTML = "";
        ["hair", "face", "top", "bottoms"].forEach((category) => {
          const label = document.createElement("label");
          label.textContent = categories.find((item) => item.key === category).label;
          const select = document.createElement("select");
          const noneOption = document.createElement("option");
          noneOption.value = "";
          noneOption.textContent = "不穿（本地預覽）";
          select.appendChild(noneOption);
          items[category].forEach((item) => {
            const option = document.createElement("option");
            option.value = item.id;
            option.textContent = item.label;
            select.appendChild(option);
          });
          select.value = state.preview[category];
          select.addEventListener("change", () => {
            state.preview[category] = select.value || null;
            if (state.category === category) {
              state.targetId = select.value || items[category][0].id;
              startDraft();
            }
            renderAll();
          });
          const box = document.createElement("div");
          box.append(label, select);
          wrap.appendChild(box);
        });
      }

      function renderTabs() {
        const wrap = document.getElementById("tabs");
        wrap.innerHTML = "";
        categories.forEach((category) => {
          const btn = document.createElement("button");
          btn.textContent = category.label;
          btn.className = state.category === category.key ? "active" : "";
          btn.addEventListener("click", () => {
            state.category = category.key;
            state.targetId = category.key === "template" ? "template-00" : items[category.key][0].id;
            state.layer = "front";
            startDraft();
            renderAll();
          });
          wrap.appendChild(btn);
        });
      }

      function renderGrid() {
        const grid = document.getElementById("item-grid");
        grid.innerHTML = "";

        const list = state.category === "template" ? templates : items[state.category];

        list.forEach((item) => {
          const btn = document.createElement("button");
          btn.className = `item-card ${state.targetId === item.id ? "active" : ""} ${
            state.category !== "template" && state.preview[state.category] === item.id
              ? "equipped"
              : ""
          }`;
          btn.title = item.label;

          if (state.category === "template") {
            const img = document.createElement("img");
            img.className = "thumb-layer";
            img.src = item.img;
            applyThumbStyle(img, displayTemplateSetting(item.id));
            btn.appendChild(img);
          } else {
            [
              ["back", item.backImg],
              ["front", item.frontImg],
            ]
              .filter(([, src]) => Boolean(src))
              .forEach(([layer, src]) => {
                const setting = displaySetting(item.id, layer);
                if (layer === "back" && setting.show_thumb === false) return;

                const img = document.createElement("img");
                img.className = `thumb-layer ${state.category}-${layer}`;
                img.src = src;
                applyThumbStyle(img, setting);
                btn.appendChild(img);
              });

            if (item.thumbImg) {
              const customThumb = document.createElement("img");
              customThumb.className = "thumb-layer custom-thumb";
              customThumb.src = item.thumbImg;
              customThumb.addEventListener("error", () => customThumb.remove());
              btn.appendChild(customThumb);
            }
          }

          btn.addEventListener("click", () => {
            state.targetId = item.id;
            if (state.category !== "template") {
              state.preview[state.category] =
                state.preview[state.category] === item.id ? null : item.id;
            }
            state.layer = "front";
            startDraft();
            renderAll();
          });

          grid.appendChild(btn);
        });
      }

      function renderLayerSelect() {
        const select = document.getElementById("layer-select");
        select.innerHTML = "";

        if (state.category === "template") {
          const option = document.createElement("option");
          option.value = "template";
          option.textContent = "模板";
          select.appendChild(option);
          select.disabled = true;
          return;
        }

        const item = items[state.category].find((entry) => entry.id === state.targetId);
        ["front", item?.backImg ? "back" : null].filter(Boolean).forEach((layer) => {
          const option = document.createElement("option");
          option.value = layer;
          option.textContent = layer === "front" ? "上層" : "下層";
          select.appendChild(option);
        });
        select.disabled = false;
        select.value = state.layer;
      }

      function renderControls() {
        renderLayerSelect();
        const setting = ensureDraft();
        document.getElementById("target-label").textContent = `目前校準：${state.targetId}${state.category === "template" ? "" : ` / ${state.layer}`}`;

        [
          ["scale", "scale-value", setting.scale],
          ["x-pct", "x-value", setting.x_pct],
          ["y-pct", "y-value", setting.y_pct],
          ["thumb-scale", "thumb-scale-value", setting.thumb_scale],
          ["thumb-x-pct", "thumb-x-value", setting.thumb_x_pct],
          ["thumb-y-pct", "thumb-y-value", setting.thumb_y_pct],
        ].forEach(([inputId, valueId, value]) => {
          const input = document.getElementById(inputId);
          input.value = value;
          document.getElementById(valueId).textContent = Number(value).toFixed(2);
        });

        const selectedItem = items[state.category]?.find((entry) => entry.id === state.targetId);
        const thumbToggleRow = document.getElementById("hair-back-thumb-row");
        const thumbToggle = document.getElementById("show-back-thumb");
        const canToggleBackThumb =
          state.category === "hair" && state.layer === "back" && Boolean(selectedItem?.backImg);

        thumbToggleRow.classList.toggle("visible", canToggleBackThumb);
        thumbToggle.checked = setting.show_thumb !== false;
      }

      function updateFromControls() {
        const previous = ensureDraft();
        state.draftSetting = {
          scale: Number(document.getElementById("scale").value),
          x_pct: Number(document.getElementById("x-pct").value),
          y_pct: Number(document.getElementById("y-pct").value),
          thumb_scale: Number(document.getElementById("thumb-scale").value),
          thumb_x_pct: Number(document.getElementById("thumb-x-pct").value),
          thumb_y_pct: Number(document.getElementById("thumb-y-pct").value),
          show_thumb: previous.show_thumb !== false,
        };

        renderAll();
      }

      function renderCropControls() {
        const crop = state.settings.crop || DEFAULT_AVATAR_CROP_SETTINGS;
        const panel = document.getElementById("crop-tools-panel");
        const toggle = document.getElementById("toggle-crop-tools");

        panel.classList.toggle("visible", state.showCropTools);
        toggle.textContent = state.showCropTools
          ? "隱藏全域頭像裁切框"
          : "顯示全域頭像裁切框";

        [
          ["crop-size-pct", "crop-size-value", crop.size_pct],
          ["crop-x-pct", "crop-x-value", crop.x_pct],
          ["crop-y-pct", "crop-y-value", crop.y_pct],
          ["crop-scale", "crop-scale-value", crop.scale],
        ].forEach(([inputId, valueId, value]) => {
          const input = document.getElementById(inputId);
          input.value = value;
          document.getElementById(valueId).textContent = Number(value).toFixed(2);
        });
      }

      function updateCropControls() {
        state.settings.crop = {
          size_pct: Number(document.getElementById("crop-size-pct").value) || 46,
          x_pct: Number(document.getElementById("crop-x-pct").value) || 0,
          y_pct: Number(document.getElementById("crop-y-pct").value) || 0,
          scale: Number(document.getElementById("crop-scale").value) || 1,
        };

        persistSettings();
        renderCropControls();
        renderStage();
        exportCode();
      }

      function exportCode() {
        const code = `// Global avatar item placement settings.
// Exported from avatar-relative-calibrator.html.
// These settings use relative percentages, so item placement scales with any avatar container.
export const DEFAULT_AVATAR_ITEM_SETTINGS = ${JSON.stringify(state.settings.items, null, 2)};

export const DEFAULT_AVATAR_BODY_Y = "0";

export const DEFAULT_AVATAR_TEMPLATE_SETTINGS = ${JSON.stringify(state.settings.templates, null, 2)};

export const DEFAULT_AVATAR_CROP_SETTINGS = ${JSON.stringify(state.settings.crop, null, 2)};
`;
        document.getElementById("export-output").value = code;
        return code;
      }

      function renderAll(updateExport = true) {
        renderPreviewSelectors();
        renderTabs();
        renderGrid();
        renderControls();
        renderCropControls();
        renderStage();
        if (updateExport) exportCode();
      }

      document.getElementById("layer-select").addEventListener("change", (event) => {
        state.layer = event.target.value;
        startDraft();
        renderAll();
      });

      ["scale", "x-pct", "y-pct", "thumb-scale", "thumb-x-pct", "thumb-y-pct"].forEach((id) => {
        document.getElementById(id).addEventListener("input", updateFromControls);
      });

      ["crop-size-pct", "crop-x-pct", "crop-y-pct", "crop-scale"].forEach((id) => {
        document.getElementById(id).addEventListener("input", updateCropControls);
      });

      document.getElementById("toggle-crop-tools").addEventListener("click", () => {
        state.showCropTools = !state.showCropTools;
        renderCropControls();
        renderStage();
      });

      document.getElementById("save-target").addEventListener("click", () => {
        updateFromControls();
        saveCurrentSetting(ensureDraft());
        startDraft();
        renderAll();
        alert("已儲存目前目標。");
      });

      document.getElementById("reset-target").addEventListener("click", () => {
        state.draftKey = settingKey();
        state.draftSetting = defaultSetting();
        renderAll();
      });

      document.getElementById("show-back-thumb").addEventListener("change", (event) => {
        state.draftSetting = {
          ...ensureDraft(),
          show_thumb: event.target.checked,
        };
        renderAll();
      });

      document.getElementById("copy-code").addEventListener("click", async () => {
        const code = exportCode();
        try {
          await navigator.clipboard.writeText(code);
          alert("已複製匯出碼。");
        } catch {
          const output = document.getElementById("export-output");
          output.select();
          document.execCommand("copy");
          alert("已嘗試複製匯出碼。");
        }
      });

      startDraft();
      renderAll();
    </script>
  </body>
</html>
